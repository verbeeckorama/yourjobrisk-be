name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Detect base path
        id: basepath
        run: |
          # For a user/org page (repo named <user>.github.io), base path must be empty.
          # For any other project repo, serve under /<repo-name>/.
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect site URL
        id: siteurl
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "value=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "value=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.value }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.siteurl.outputs.value }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
